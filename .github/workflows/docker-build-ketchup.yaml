name: 🍅 Build and Push Ketchup Container

on:
  push:
    branches: [ main, master ]
    paths:
      - 'ketchup/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'ketchup/**'
  workflow_dispatch:  # Allow manual triggering

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: gagrio/ketchup

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # For cosign signing

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📊 Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Set latest tag for main/master branch
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            # Set version tags from git tags
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Set PR tags
            type=ref,event=pr
            # Add commit SHA for tracking
            type=sha,prefix={{branch}}-
          labels: |
            org.opencontainers.image.title=Ketchup - Kubernetes Config Collector
            org.opencontainers.image.description=Collect Kubernetes cluster configuration for backup and analysis
            org.opencontainers.image.vendor=SUSE
            org.opencontainers.image.source=https://github.com/Gagrio/suse-support-material/tree/master/ketchup
            org.opencontainers.image.licenses=Apache-2.0

      - name: 🏗️ Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: ./ketchup
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: 🔏 Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: ✍️ Sign container image with cosign
        if: github.event_name != 'pull_request'
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}

      - name: 📋 Generate SBOM
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: spdx-json
          output-file: sbom.spdx.json

      - name: 📤 Upload SBOM
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

      - name: 🔍 Run Trivy vulnerability scanner
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: 📊 Upload Trivy scan results
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: 🎉 Success notification
        if: success() && github.event_name != 'pull_request'
        run: |
          echo "🍅 Ketchup container successfully built and pushed!"
          echo "📦 Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "🔗 Pull with: podman pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
